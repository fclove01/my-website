<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Cưới | Cường & Thảo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
</head>
<body class="font-sans antialiased py-12 px-6">
    <div class="max-w-7xl mx-auto">
        
        <div class="mb-8 relative">
            <a href="index.html" class="absolute left-0 top-2 text-gray-500 hover:text-gray-900 transition flex items-center gap-2 text-sm uppercase tracking-widest">
                <span>&larr;</span> Trở về
            </a>
            <div class="text-center">
                <h1 class="font-serif text-4xl md:text-5xl mb-4">Khoảnh Khắc</h1>
                <div class="w-16 h-[1px] bg-gray-900 mx-auto"></div>
            </div>
        </div>

        <div class="flex justify-center flex-wrap gap-4 md:gap-8 mb-10 border-b border-gray-200 pb-2">
            <button onclick="switchTab('wedding')" id="btn-wedding" class="tab-btn px-2 py-2 font-serif text-lg md:text-xl text-[#d4af37] border-b-2 border-[#d4af37] transition">Ảnh Cưới</button>
            <button onclick="switchTab('love')" id="btn-love" class="tab-btn px-2 py-2 font-serif text-lg md:text-xl text-gray-400 hover:text-gray-800 transition">Lúc Yêu Nhau</button>
            <button onclick="switchTab('guest')" id="btn-guest" class="tab-btn px-2 py-2 font-serif text-lg md:text-xl text-gray-400 hover:text-gray-800 transition">Khách Gửi Tặng</button>
        </div>

        <div class="masonry" id="photo-gallery">
            <div class="col-span-full text-center text-gray-400 py-10" id="loader">Đang tải album...</div>
        </div>
    </div>

    <script src="js/photo.js"></script>
</body>
</html>
