<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Cưới | Cường & Thảo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#fdfbf7', dark: '#2c2c2c', accent: '#d4af37' } },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fdfbf7; color: #2c2c2c; }
        /* CSS chia cột Masonry (Giống Pinterest) */
        .masonry { column-count: 2; column-gap: 1rem; }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1024px) { .masonry { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
        .masonry-item img { width: 100%; border-radius: 0.5rem; object-fit: cover; transition: transform 0.3s ease; }
        .masonry-item img:hover { transform: scale(1.02); }
    </style>
</head>
<body class="font-sans antialiased py-12 px-6">
    <div class="max-w-7xl mx-auto">
        
        <div class="mb-12 relative">
            <a href="index.html" class="absolute left-0 top-2 text-gray-500 hover:text-wedding-dark transition flex items-center gap-2 text-sm uppercase tracking-widest">
                <span>&larr;</span> Trở về
            </a>
            <div class="text-center">
                <h1 class="font-serif text-4xl md:text-5xl mb-4">Khoảnh Khắc</h1>
                <div class="w-16 h-[1px] bg-wedding-dark mx-auto"></div>
                <p class="text-gray-500 mt-4 font-light">Những kỷ niệm tuyệt đẹp của chúng mình.</p>
            </div>
        </div>

        <div class="masonry">
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?w=600" alt="Wedding Photo">
            </div>
            <div class="masonry-item">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600" alt="Wedding Photo">
            </div>
        </div>
    </div>
</body>
</html>
