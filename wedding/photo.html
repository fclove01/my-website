<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Cưới | Cường & Thảo</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Lightbox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --light: #f9f7f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #faf8f4, #ffffff);
            color: var(--dark);
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            left: 20px;
            top: 30px;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            color: #555;
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.05);
            color: black;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 50px 0 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: none;
            background: transparent;
            font-size: 18px;
            padding: 10px 20px;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            position: relative;
            color: #888;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--gold);
        }

        .tab-btn::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: 0.3s;
            transform: translateX(-50%);
        }

        .tab-btn.active::after {
            width: 70%;
        }

        .tab-btn:hover {
            color: black;
        }

        /* Gallery */
        .gallery {
            column-count: 3;
            column-gap: 20px;
        }

        .gallery-item {
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 14px;
            position: relative;
        }

        .gallery img {
            width: 100%;
            display: block;
            border-radius: 14px;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .loader {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-style: italic;
        }

        @media(max-width: 992px){
            .gallery {
                column-count: 2;
            }
        }

        @media(max-width: 600px){
            .gallery {
                column-count: 1;
            }

            .hero h1 {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="index.html" class="back-btn">← TRỞ VỀ</a>

        <div class="hero">
            <h1>Khoảnh Khắc</h1>
            <div class="divider"></div>
        </div>

        <div class="tabs">
            <button onclick="switchTab('love')" id="btn-love" class="tab-btn active">Lúc Yêu Nhau</button>
            <button onclick="switchTab('wedding')" id="btn-wedding" class="tab-btn">Ảnh Cưới</button>
            <button onclick="switchTab('guest')" id="btn-guest" class="tab-btn">Khách Gửi Tặng</button>
        </div>

        <div class="gallery" id="photo-gallery">
            <div class="loader" id="loader">Đang tải album...</div>
        </div>

    </div>

    <script>
        const lightbox = GLightbox({
            selector: '.gallery a'
        });
    </script>

    <script src="js/photo.js"></script>

</body>
</html>
